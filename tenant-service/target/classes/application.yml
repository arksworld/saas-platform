server:
  port: 8081

spring:
  application:
    name: tenant-service

  datasource:
    url: jdbc:postgresql://localhost:5432/control_db
    username: postgres
    password: postgres

  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/core

  data:
    redis:
      host: localhost
      port: 6379