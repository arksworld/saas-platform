version: '3.8'

services:
  #Auth DB
  auth-db:
    image: postgres:15
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - saas-network
  # 🧠 Control Plane DB (Tenant metadata)
  control-db:
    image: postgres:15
    container_name: control-db
    restart: always
    environment:
      POSTGRES_DB: control_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - control-db-data:/var/lib/postgresql/data
    networks:
      - saas-network

  # 🧩 Shard DB 1
  shard-db-1:
    image: postgres:15
    container_name: shard-db-1
    restart: always
    environment:
      POSTGRES_DB: shard_db_1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - shard1-data:/var/lib/postgresql/data
    networks:
      - saas-network

  # 🧩 Shard DB 2
  shard-db-2:
    image: postgres:15
    container_name: shard-db-2
    restart: always
    environment:
      POSTGRES_DB: shard_db_2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - shard2-data:/var/lib/postgresql/data
    networks:
      - saas-network

  # ⚡ Redis (Tenant routing cache)
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - saas-network

  # Kafka
  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
# 🔗 Shared Network
networks:
  saas-network:
    driver: bridge

# 💾 Persistent Volumes
volumes:
  control-db-data:
  auth-db-data:
  shard1-data:
  shard2-data:
  redis-data: