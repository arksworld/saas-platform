server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/products/**

        - id: auth-service
          uri: http://localhost:8083
          predicates:
            - Path=/auth/**

        - id: tenant-service
          uri: http://localhost:8081
          predicates:
            - Path=/tenants/**